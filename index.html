<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effective Octo Palm Tree</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, rgba(255, 206, 0, 1), rgba(255, 105, 180, 1));
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #333;
        }
        section {
            width: 90%;
            max-width: 1200px;
            margin: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        footer {
            position: fixed;
            bottom: 10px;
            font-size: 0.9rem;
            color: #666;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Effective Octo Palm Tree</h1>
    </header>
    <section>
        <h2>Admin Dashboard</h2>
        <p>Analytics, Product Showcase, Customer Testimonials, and more!</p>
        <h3>Admin Login</h3>
        <form action="/admin" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" value="admin123" required>
            <button type="submit" class="btn">Login</button>
        </form>
    </section>
    <footer>
        <p>UPI ID: someshtandon75@okicici</p>
    </footer>
</body>
</html>
